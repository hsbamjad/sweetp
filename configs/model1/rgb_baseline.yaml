# Model 1 — RGB Baseline
# Standard yolo26m-seg, RGB input, 3-class sweet potato
experiment_name: model1_rgb_baseline
model_base: yolo26m-seg.pt
model_size: m
n_channels: 3
nc: 3

data_yaml: S:/MSU_Research/sweetpotatoes/processed_data/RGB/data.yaml
project:   S:/MSU_Research/sweetpotatoes/runs

# Training
epochs: 150
batch:  16
imgsz:  640
workers: 8

# Learning rate
lr0:           0.01
lrf:           0.01
momentum:      0.937
weight_decay:  0.0005
warmup_epochs: 3.0

# Loss
box: 7.5
cls: 0.5
dfl: 1.5

# Augmentation (aggressive — helps with limited data)
hsv_h:     0.015
hsv_s:     0.7
hsv_v:     0.4
degrees:   10.0
translate: 0.1
scale:     0.5
flipud:    0.5
fliplr:    0.5
mosaic:    1.0
mixup:     0.0

# Class imbalance: copy_paste multiplies Severe defect instances
copy_paste: 0.3
