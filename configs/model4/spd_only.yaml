# Model 4 — SPD-Conv Only
# R/NIR1/NIR2 + SPD-Conv stem (no NIRDiffFusion)
experiment_name: model4_spd_only
model_base: yolo26m-seg.pt
model_size: m
n_channels: 3
nc: 3

data_yaml: processed_data/R_NIR1_NIR2/data.yaml
project:   runs

enable_spd:        true
enable_nir_fusion: false
alpha_init:        0.1

epochs: 150
batch:  16
imgsz:  640
workers: 8

lr0:           0.01
lrf:           0.01
momentum:      0.937
weight_decay:  0.0005
warmup_epochs: 3.0

box: 7.5
cls: 0.5
dfl: 1.5

hsv_h:     0.015
hsv_s:     0.7
hsv_v:     0.4
degrees:   10.0
translate: 0.1
scale:     0.5
flipud:    0.5
fliplr:    0.5
mosaic:    1.0
mixup:     0.0

# Class imbalance: copy_paste multiplies Severe defect instances
copy_paste: 0.3
